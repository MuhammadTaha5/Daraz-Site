<div class="modal slide-up-modal" id="signupModel" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog ms-0 ms-lg-auto">
            <div class="modal-content">
                <div class="animationModel">
                    <div class="modal-header">
                        <div class="model-SignupOption">
                            <div id="errorBoxSignUp" class="hidden">
                                <span>
                                    <i class="fa-solid fa-circle-xmark"></i>
                                    <p id="msg">Enter a Valid Login Password</p>
                                </span>
                            </div>
                            <div class="active signupHeader">
                                Sign up
                            </div>
                        </div>

                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="signUpPhone" action="" class="modal-body">
                        <div class="phoneSectionSignup">
                            <div id="countryCodeInput">
                                <span>PK</span>
                                <span>+92</span>
                            </div>
                            <div class="phoneInput">
                                <input type="number" name="signUpPhoneInput" id="signUpPhoneInput"
                                    placeholder="Please enter your phone number">
                            </div>
                        </div>
                        <div class="privacyPolicyLog">
                            <input class="form-check-input" type="checkbox" id="checkboxPrivacyPolicy" value=""
                                aria-label="...">
                            <label for="privacyPolicyCheck">By creating and/or using your account, you agree to our <a
                                    href="#">Terms of Use</a> and <a href="#">Privacy Policy.</a></label>
                        </div>


                        <button type="submit" class="submitLoginPhone" id="signUpButton"><img
                                class="index_module_otpLoginIcon__f93aa605"
                                src="https://lzd-img-global.slatic.net/g/tps/imgextra/i2/O1CN01a3DUz31SqzLbTfmQ2_!!6000000002299-2-tps-54-54.png">Send
                            code
                            via Whatsapp</button>


                    </form>
                    <div id="dontHaveAccount">
                        <span>Already have an account?</span>
                        <span><a id="loginLink" href="#" data-bs-toggle="modal" data-bs-target="#loginModel"
                                data-bs-dismiss="modal" aria-label="Close"> Log in Now</a></span>
                    </div>
                    <div class="noAccount">

                        <div class="loginThirdParty">
                            <div>
                                Or, signup with
                            </div>
                            <div id="thirdPartyLoginOptions">
                                <a><img src="assets/icons/googleIcon.png" alt="" id="googleIcon"><span>Google</span></a>
                                <a><img src="assets/icons/facebookIcon.png" alt="" id="fbIcon"><span>Facebook</span></a>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
